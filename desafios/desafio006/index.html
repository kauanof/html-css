<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 006</title>
</head>
<body>
        <h1>Tags em HTML5</h1>
        <p>Em HTML utilizamos algumas tags. Elas serão descritas abaixo:</p>
        <ul>
            <li><abbr title="Usa-se a tag &lt;p&gt;">Parágrafo</abbr></li>
            <li><abbr title="Usa-se a tag &lt;title&gt;">Títulos</abbr></li>
            <li><abbr title="Usa-se a tag &lt;img&gt;">Imagens</abbr></li>
            <li><abbr title="Usa-se a tag &lt;abbr&gt;">Abreviações</abbr></li>
            <li><abbr title="Usa-se a tag &lt;code&gt;">Codigo-fonte</abbr></li>
            <li><abbr title="Usa-se a tag &lt;ol&gt;">Listas numeradas</abbr></li>
            <li><abbr title="Usa-se a tag &lt;ul&gt;">Listas com demarcadores</abbr></li>
            <li><abbr title="Usa-se a tag &lt;br&gt;">Quebra de linha</abbr></li>
            <li><abbr title="Usa-se a tag &lt;strong&gt;"><strong>Negrito</strong></abbr></li>
            <li><abbr title="Usa--se a tag &lt;em&gt;"><em>Itálico</em></abbr></li>
            <li><abbr title="Usa-se a tag &lt;mark&gt;"><mark>Marca texto</mark></abbr></li>
        </ul>
</body>
</html>
